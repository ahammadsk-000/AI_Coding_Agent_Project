name: ai-coding-agent

services:
  postgres:
    image: postgres:16-alpine
    container_name: aca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-ai_coding_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-ai_coding_agent}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [aca]

  redis:
    image: redis:7-alpine
    container_name: aca-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [aca]

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: aca-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ': </dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [aca]

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: dev
    container_name: aca-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-ai_coding_agent}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      # Phase 5: name of the Docker volume holding cloned repos, so the api can
      # mount it (read-only) into ephemeral sandbox containers it spawns.
      SANDBOX_WORKSPACE_VOLUME: ai-coding-agent_ingest_workspace
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      # Phase 5: Docker socket so the api can launch isolated sandbox containers.
      # NOTE: this grants the api control of the host Docker daemon — acceptable
      # for local single-user dev, NOT for multi-tenant production.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [aca]

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: dev
    container_name: aca-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-ai_coding_agent}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      # Cache HF / sentence-transformers models inside a named volume across restarts
      HF_HOME: /var/cache/huggingface
      TRANSFORMERS_CACHE: /var/cache/huggingface
      SENTENCE_TRANSFORMERS_HOME: /var/cache/huggingface
      # Phase 8: aggregate prefork-child metrics into one scrape endpoint (:9100)
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    volumes:
      - ./apps/api:/app
      - hf_cache:/var/cache/huggingface
      - ingest_workspace:/var/lib/aca/workspace
    expose:
      - "9100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: ["celery", "-A", "app.tasks.celery_app:celery_app", "worker", "--loglevel=INFO", "--concurrency=2", "-Q", "default,ingest"]
    networks: [aca]

  flower:
    image: mher/flower:2.0
    container_name: aca-flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      FLOWER_PORT: "5555"
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks: [aca]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: dev
    container_name: aca-web
    restart: unless-stopped
    env_file: .env
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_BASE_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api
    networks: [aca]

  nginx:
    image: nginx:1.27-alpine
    container_name: aca-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks: [aca]

  # ---- Phase 8: observability ----
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: aca-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks: [aca]

  grafana:
    image: grafana/grafana:11.3.1
    container_name: aca-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks: [aca]

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  hf_cache:
  ingest_workspace:
  prometheus_data:
  grafana_data:

networks:
  aca:
    driver: bridge
