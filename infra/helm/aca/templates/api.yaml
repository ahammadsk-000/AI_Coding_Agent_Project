apiVersion: v1
kind: Service
metadata:
  name: {{ include "aca.fullname" . }}-api
  labels:
    {{- include "aca.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  ports:
    - name: http
      port: {{ .Values.api.containerPort }}
      targetPort: http
  selector:
    {{- include "aca.selectorLabels" (dict "ctx" . "component" "api") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aca.fullname" . }}-api
  labels:
    {{- include "aca.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aca.selectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aca.selectorLabels" (dict "ctx" . "component" "api") | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.api.containerPort | quote }}
        prometheus.io/path: /metrics
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "aca.serviceAccountName" . }}
      containers:
        - name: api
          image: {{ include "aca.image" (dict "ctx" . "image" .Values.images.api) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            {{- toYaml .Values.api.command | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.containerPort }}
          envFrom:
            - configMapRef: { name: {{ include "aca.fullname" . }}-config }
            - secretRef: { name: {{ include "aca.fullname" . }}-secrets }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
