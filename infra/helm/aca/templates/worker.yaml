apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aca.fullname" . }}-worker
  labels:
    {{- include "aca.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.autoscaling.enabled }}
  replicas: {{ .Values.worker.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "aca.selectorLabels" (dict "ctx" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aca.selectorLabels" (dict "ctx" . "component" "worker") | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.worker.metricsPort | quote }}
        prometheus.io/path: /metrics
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "aca.serviceAccountName" . }}
      containers:
        - name: worker
          image: {{ include "aca.image" (dict "ctx" . "image" .Values.images.worker) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            {{- toYaml .Values.worker.command | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ .Values.worker.metricsPort }}
          env:
            - name: PROMETHEUS_MULTIPROC_DIR
              value: /tmp/prometheus_multiproc
          envFrom:
            - configMapRef: { name: {{ include "aca.fullname" . }}-config }
            - secretRef: { name: {{ include "aca.fullname" . }}-secrets }
          readinessProbe:
            exec:
              command: ["sh", "-c", "celery -A app.tasks.celery_app:celery_app inspect ping -d celery@$HOSTNAME"]
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
