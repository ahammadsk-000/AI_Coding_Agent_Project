{{- if .Values.qdrant.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aca.fullname" . }}-qdrant
  labels:
    {{- include "aca.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  ports:
    - name: http
      port: {{ .Values.qdrant.httpPort }}
      targetPort: http
    - name: grpc
      port: {{ .Values.qdrant.grpcPort }}
      targetPort: grpc
  selector:
    {{- include "aca.selectorLabels" (dict "ctx" . "component" "qdrant") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aca.fullname" . }}-qdrant
  labels:
    {{- include "aca.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ include "aca.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      {{- include "aca.selectorLabels" (dict "ctx" . "component" "qdrant") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aca.selectorLabels" (dict "ctx" . "component" "qdrant") | nindent 8 }}
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.qdrant.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.httpPort }}
            - name: grpc
              containerPort: {{ .Values.qdrant.grpcPort }}
          volumeMounts:
            - name: data
              mountPath: /qdrant/storage
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.qdrant.storageClassName }}
        storageClassName: {{ .Values.qdrant.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.qdrant.storage }}
{{- end }}
