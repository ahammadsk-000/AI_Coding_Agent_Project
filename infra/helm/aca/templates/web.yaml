apiVersion: v1
kind: Service
metadata:
  name: {{ include "aca.fullname" . }}-web
  labels:
    {{- include "aca.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  ports:
    - name: http
      port: {{ .Values.web.containerPort }}
      targetPort: http
  selector:
    {{- include "aca.selectorLabels" (dict "ctx" . "component" "web") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aca.fullname" . }}-web
  labels:
    {{- include "aca.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      {{- include "aca.selectorLabels" (dict "ctx" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aca.selectorLabels" (dict "ctx" . "component" "web") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aca.serviceAccountName" . }}
      containers:
        - name: web
          image: {{ include "aca.image" (dict "ctx" . "image" .Values.images.web) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            {{- toYaml .Values.web.command | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.web.containerPort }}
          env:
            - name: VITE_API_BASE_URL
              value: "http://{{ .Values.ingress.host }}/api"
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
