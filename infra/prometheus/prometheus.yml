global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: aca-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: aca-api

  - job_name: aca-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9100"]
        labels:
          service: aca-worker

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
