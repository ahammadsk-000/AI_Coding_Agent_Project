name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-lint-and-test:
    name: API · lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: ai_coding_agent
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/ai_coding_agent
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret-min-16-characters-long-xxx
      APP_ENV: development
      SEED_ADMIN: "false"
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy app
      - name: Enable Postgres extensions
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=app psql -h localhost -U app -d ai_coding_agent -c 'CREATE EXTENSION IF NOT EXISTS "citext"; CREATE EXTENSION IF NOT EXISTS "pgcrypto";'
      - name: Pytest
        run: pytest -q --no-cov tests/test_security_unit.py
        # Full integration suite (which uses testcontainers) runs in nightly CI;
        # PR CI uses the GH services Postgres/Redis and only the unit tier here.

  web-lint-and-build:
    name: Web · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm test
      - run: pnpm build

  docker-build:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [api-lint-and-test, web-lint-and-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          target: prod
          push: false
          tags: aca-api:ci
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          target: build
          push: false
          tags: aca-web:ci
